name: Publish to crates.io

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always

permissions: {}

jobs:
  publish:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    environment:
      name: crates.io

    permissions:
      id-token: write # for Trusted Publishing to crates.io

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      # See: <https://github.com/rust-lang/cargo/issues/17093>
      # This can be removed once the stable toolchain has a fix for `cargo publish --workspace`.
      - name: install rust toolchain
        run: rustup toolchain install nightly-2026-06-12 --profile minimal --no-self-update

      - uses: rust-lang/crates-io-auth-action@bbd81622f20ce9e2dd9622e3218b975523e45bbe # v1.0.4
        id: auth

      - name: Publish to crates.io
        run: cargo +nightly-2026-06-12 publish --workspace
        env:
          CARGO_REGISTRY_TOKEN: "${{ steps.auth.outputs.token }}"
